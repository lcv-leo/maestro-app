name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
permissions:
  contents: read
jobs:
  hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: npm audit
        run: npm audit --audit-level=moderate
      - name: Frontend tests
        run: npm test
      - name: Build frontend
        run: npm run build
      - name: Verify private protocol artifacts are absent
        shell: bash
        run: |
          if find docs/source-protocols -type f -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "Private source protocol Markdown files must not be committed." >&2
            exit 1
          fi
      - name: Detect common secret-shaped strings
        shell: bash
        run: |
          secret_pattern='(^|[^A-Za-z0-9_])(sk-[A-Za-z0-9_-]{20,}|sk-ant-[A-Za-z0-9_-]{20,}|sk_live_[A-Za-z0-9_-]{20,}|cfut_[A-Za-z0-9_-]{20,}|cfat_[A-Za-z0-9_-]{20,}|cfk_[A-Za-z0-9_-]{20,}|xox[baprs]-[A-Za-z0-9-]{20,}|gh[pousr]_[A-Za-z0-9_]{20,}|AIza[0-9A-Za-z_-]{20,}|re_[A-Za-z0-9_-]{20,}|AKIA[0-9A-Z]{16})'
          if grep -RInE "${secret_pattern}" . \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=build \
            --exclude-dir=out \
            --exclude-dir=target \
            --exclude='package-lock.json' \
            --exclude='Cargo.lock'; then
            echo "Secret-shaped string detected. Use placeholders such as <api_key_redacted>." >&2
            exit 1
          fi
    timeout-minutes: 30
  rust-gates:
    name: Rust gates (cargo --locked)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Rust stable
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable
      - name: cargo check --locked
        working-directory: src-tauri
        run: cargo check --locked --all-targets
      - name: cargo test --locked
        working-directory: src-tauri
        run: cargo test --locked
      - name: cargo clippy --locked
        working-directory: src-tauri
        run: cargo clippy --locked --no-deps --all-targets
    timeout-minutes: 30
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
