name: Release
on:
  push:
    branches:
      - "main"
    paths:
      - "package.json"
      - "src-tauri/Cargo.toml"
      - "src-tauri/tauri.conf.json"
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing vXX.YY.ZZ or vXX.YY.ZZ-betaN tag to publish"
        required: true
        type: string
permissions:
  contents: read
env:
  NODE_VERSION: 24
concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false
jobs:
  prepare-release:
    name: Prepare release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      should_release: ${{ steps.release.outputs.should_release }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          universal_tag_from_version() {
            local version="$1"
            local core="${version%%-*}"
            local suffix=""
            if [[ "$version" == *-* ]]; then
              suffix="-${version#*-}"
            fi

            IFS='.' read -r major minor patch <<< "$core"
            printf 'v%02d.%02d.%02d%s' "$major" "$minor" "$patch" "$suffix"
          }

          legacy_tag_from_version() {
            local version="$1"
            local core="${version%%-*}"
            local suffix=""
            if [[ "$version" == *-* ]]; then
              suffix="-${version#*-}"
            fi

            IFS='.' read -r major minor patch <<< "$core"
            printf 'v%d.%d.%d%s' "$major" "$minor" "$patch" "$suffix"
          }

          should_release="true"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_TAG}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            version="$(node -p "require('./package.json').version")"
            tag="$(universal_tag_from_version "$version")"
            legacy_tag="$(legacy_tag_from_version "$version")"

            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Release tag ${tag} already exists. Skipping duplicate release."
              should_release="false"
            elif [[ "$legacy_tag" != "$tag" ]] && git ls-remote --exit-code --tags origin "refs/tags/${legacy_tag}" >/dev/null 2>&1; then
              echo "Legacy release tag ${legacy_tag} already exists for ${tag}. Skipping duplicate release."
              should_release="false"
            fi
          fi

          if [[ ! "$tag" =~ ^v[0-9]{2}\.[0-9]{2}\.[0-9]{2}(-beta[0-9]+)?$ ]]; then
            echo "::error::Release tag must use vXX.YY.ZZ or vXX.YY.ZZ-betaN, got '${tag}'."
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"
    timeout-minutes: 60
  release-gates:
    name: Release gates
    runs-on: windows-latest
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout release ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.sha }}
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Setup Rust stable
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable
      - name: Install dependencies
        run: npm ci
      - name: npm audit
        run: npm audit --audit-level=moderate
      - name: Frontend tests
        run: npm test
      - name: Build frontend
        run: npm run build
      - name: cargo check --locked
        working-directory: src-tauri
        run: cargo check --locked --all-targets
      - name: cargo test --locked
        working-directory: src-tauri
        run: cargo test --locked
      - name: cargo clippy --locked
        working-directory: src-tauri
        run: cargo clippy --locked --no-deps --all-targets
    timeout-minutes: 30
  build-windows-portable:
    name: Build Windows portable bundle
    runs-on: windows-latest
    permissions:
      contents: read
      attestations: write
      id-token: write
    needs:
      - prepare-release
      - release-gates
    if: needs.prepare-release.outputs.should_release == 'true'
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout release ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.sha }}
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Setup Rust stable
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Install dependencies
        run: npm ci
      - name: Build Tauri portable executable
        run: npm run tauri -- build --ci --no-bundle -- --locked
      - name: Create portable release archive
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:RELEASE_TAG
          if ($tag -notmatch '^v\d{2}\.\d{2}\.\d{2}(-beta\d+)?$') {
            throw "Release tag must use vXX.YY.ZZ or vXX.YY.ZZ-betaN, got '$tag'."
          }

          $binary = "src-tauri\target\release\maestro-editorial-ai.exe"
          if (!(Test-Path $binary)) {
            throw "Expected portable executable was not produced at $binary."
          }

          $releaseRoot = "release"
          $stage = Join-Path $releaseRoot "Maestro-Editorial-AI-$tag-windows-x64-portable"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          Copy-Item $binary (Join-Path $stage "Maestro Editorial AI.exe")
          Copy-Item LEIAME.md $stage
          Copy-Item LICENSE $stage
          Copy-Item CHANGELOG.md $stage

          @"
          Maestro Editorial AI $tag

          Portable Windows 11+ bundle.
          Run "Maestro Editorial AI.exe" from this folder.

          This archive is the primary user-facing distribution format.
          It is intentionally not an installer and does not require a NuGet package.
          Runtime data is written under local app folders such as data/logs.
          "@ | Set-Content -Path (Join-Path $stage "PORTABLE-RUN.txt") -Encoding UTF8

          $zip = Join-Path $releaseRoot "maestro-editorial-ai-$tag-windows-x64-portable.zip"
          Compress-Archive -Path (Join-Path $stage "*") -DestinationPath $zip -Force

          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          $zipName = Split-Path $zip -Leaf
          "$hash  $zipName" | Set-Content -Path (Join-Path $releaseRoot "SHA256SUMS.txt") -Encoding ascii
      - name: Upload portable archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maestro-windows-portable-${{ env.RELEASE_TAG }}
          path: |
            release/*.zip
            release/SHA256SUMS.txt
          if-no-files-found: error
      - name: Attest portable archive
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: release/*.zip
    timeout-minutes: 60
  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - prepare-release
      - build-windows-portable
    if: needs.prepare-release.outputs.should_release == 'true'
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Download portable archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: maestro-windows-portable-${{ env.RELEASE_TAG }}
          path: release
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          if [[ ! "$tag" =~ ^v[0-9]{2}\.[0-9]{2}\.[0-9]{2}(-beta[0-9]+)?$ ]]; then
            echo "Release tag must use vXX.YY.ZZ or vXX.YY.ZZ-betaN, got '$tag'." >&2
            exit 1
          fi

          cat > RELEASE_NOTES.md <<'NOTES'
          # Maestro Editorial AI __TAG__

          Portable Windows 11+ editorial workbench for protocol-driven AI drafting, source verification, and multi-agent convergence.

          ## Download

          - Portable app: [`maestro-editorial-ai-__TAG__-windows-x64-portable.zip`](https://github.com/__REPOSITORY__/releases/download/__TAG__/maestro-editorial-ai-__TAG__-windows-x64-portable.zip)
          - Checksum file: [`SHA256SUMS.txt`](https://github.com/__REPOSITORY__/releases/download/__TAG__/SHA256SUMS.txt)

          ## How to Test

          1. Download the portable ZIP from this release.
          2. Download `SHA256SUMS.txt`.
          3. Verify the ZIP checksum.
          4. Extract the ZIP into a local folder.
          5. Run `Maestro Editorial AI.exe`.

          ## What This Release Contains

          - Tauri 2 / WebView2 Windows shell.
          - React workbench UI for real editorial session execution.
          - Protocol import surface with strict full-protocol gate.
          - PostEditor parity surface for MainSite-compatible HTML editing.
          - Friendly background-operation indicators with running/completed/blocked states.
          - Settings UI for Cloudflare credentials and AI provider credentials.
          - Three persistence modes in the product contract: local JSON, Windows env-var hybrid, and Cloudflare D1 `maestro_db` plus Secrets Store.
          - One NDJSON diagnostic log file per app execution, with expanded frontend/native context.
          - First functional CLI orchestration pass: selectable Claude/Codex/Gemini draft lead plus Claude, Codex, and Gemini review.
          - Windows background execution for CLI agents, with no visible terminal windows in release builds.
          - No artificial timeout for real editorial agent calls; long model latency is surfaced through UI heartbeat progress.
          - Session artifacts under `data/sessions/<run-id>/`, including prompts, per-agent raw outputs, minutes, and final text only when consensus is ready.

          ## Current Limits

          - This is a functional alpha for practical smoke testing, not the final editorial engine.
          - CLI adapters are now real, but still require local CLI authentication and more hardening for resumable/cancellable long sessions.
          - Cloudflare persistence provisioning, link validation, ABNT formatting, and MainSite D1 publishing are planned but not production-complete in this build.
          - No NuGet package is published. GitHub Releases is the human-facing distribution channel; GitHub Packages/GHCR is only an automation mirror.

          ## Verification

          - Release workflow builds the portable executable on GitHub-hosted Windows runner.
          - ZIP receives a SHA-256 checksum.
          - ZIP receives GitHub artifact attestation.
          - CI, CodeQL Default Setup, and Dependabot checks are expected to be green on the release commit.
          NOTES
          sed -i "s|__TAG__|${tag}|g; s|__REPOSITORY__|${GITHUB_REPOSITORY}|g" RELEASE_NOTES.md

          assets=(release/*.zip release/SHA256SUMS.txt)
          for asset in "${assets[@]}"; do
            if [[ ! -f "$asset" ]]; then
              echo "Missing release asset: $asset" >&2
              exit 1
            fi
          done

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            edit_args=(release edit "$tag" --repo "$GITHUB_REPOSITORY" --title "Maestro Editorial AI $tag" --notes-file RELEASE_NOTES.md)
            edit_args+=(--latest)
            gh "${edit_args[@]}"
            gh release upload "$tag" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            args=(release create "$tag" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --title "Maestro Editorial AI $tag" --notes-file RELEASE_NOTES.md)
            if ! gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null 2>&1; then
              args+=(--target "$GITHUB_SHA")
            fi
            args+=(--latest)
            gh "${args[@]}"
          fi
    timeout-minutes: 60
  publish-github-package:
    name: Publish GitHub Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs:
      - prepare-release
      - publish-github-release
    if: needs.prepare-release.outputs.should_release == 'true'
    env:
      RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Download portable archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: maestro-windows-portable-${{ env.RELEASE_TAG }}
          path: release
      - name: Publish GHCR OCI mirror
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          if [[ ! "$tag" =~ ^v[0-9]{2}\.[0-9]{2}\.[0-9]{2}(-beta[0-9]+)?$ ]]; then
            echo "Release tag must use vXX.YY.ZZ or vXX.YY.ZZ-betaN, got '$tag'." >&2
            exit 1
          fi

          owner="$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/maestro-app-windows-portable"

          mkdir -p oci-package
          test -f release/SHA256SUMS.txt
          test -n "$(find release -maxdepth 1 -type f -name '*.zip' -print -quit)"
          cp release/*.zip release/SHA256SUMS.txt oci-package/

          cat > oci-package/package-metadata.json <<JSON
          {
            "name": "Maestro Editorial AI Windows portable bundle",
            "tag": "${tag}",
            "repository": "https://github.com/${GITHUB_REPOSITORY}",
            "distribution": "github-release-primary-ghcr-oci-mirror",
            "nuget": false
          }
          JSON

          cat > oci-package/README.txt <<README
          Maestro Editorial AI ${tag}

          This GitHub Package is an OCI mirror of the Windows portable ZIP published in GitHub Releases.
          Human users should download the ZIP from GitHub Releases.
          README

          cat > oci-package/Dockerfile <<DOCKERFILE
          FROM scratch
          LABEL org.opencontainers.image.title="Maestro Editorial AI Windows Portable Bundle"
          LABEL org.opencontainers.image.description="OCI mirror of the GitHub Release portable Windows ZIP."
          LABEL org.opencontainers.image.source="https://github.com/${GITHUB_REPOSITORY}"
          LABEL org.opencontainers.image.version="${tag}"
          COPY . /
          DOCKERFILE

          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          image_args=(-t "${image}:${tag}" -t "${image}:latest")
          docker build "${image_args[@]}" oci-package
          docker push "${image}:${tag}"
          docker push "${image}:latest"
    timeout-minutes: 60
