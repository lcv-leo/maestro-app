# OSV Scanner exceptions for advisories reported from Cargo.lock.
#
# Maestro currently ships a Windows portable bundle. The GTK3/glib advisories
# below are Tauri/Wry cross-platform Linux GTK dependencies recorded in the
# lockfile; `cargo tree --target x86_64-pc-windows-msvc -i gtk` and `-i glib`
# do not resolve them for the shipped target. Revisit before adding Linux
# bundles or when upstream Tauri/Wry moves this stack.

