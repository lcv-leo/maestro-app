name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify private protocol artifacts are absent
        shell: bash
        run: |
          if find docs/source-protocols -type f -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "Private source protocol Markdown files must not be committed." >&2
            exit 1
          fi

      - name: Detect common secret-shaped strings
        shell: bash
        run: |
          if grep -RInE '(sk-[A-Za-z0-9_-]{20,}|gh[pousr]_[A-Za-z0-9_]{20,}|AIza[0-9A-Za-z_-]{20,})' . --exclude-dir=.git; then
            echo "Secret-shaped string detected. Use placeholders such as <api_key_redacted>." >&2
            exit 1
          fi
